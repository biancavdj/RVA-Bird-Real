<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Bird 🐦</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    /* Remove botão VR */
    .a-enter-vr { display: none !important; }

    /*
      CORREÇÃO PRINCIPAL DA CÂMERA:
      Sem "embedded" no <a-scene>, o AR.js injeta o vídeo
      diretamente no body como elemento fixo fullscreen.
      O canvas fica transparente em cima do vídeo.
    */
    .a-canvas, canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: transparent !important;
    }

    video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: -1;
    }

    /* ── Tela de introdução ── */
    #ui-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
    }

    #hint-box {
      background: rgba(15,15,15,0.95);
      color: white;
      padding: 28px 30px;
      border-radius: 20px;
      max-width: 320px;
      width: 88%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      text-align: center;
      line-height: 1.65;
      border: 1px solid rgba(255,255,255,0.08);
    }

    #hint-box h2 { font-size: 1.4rem; margin-bottom: 14px; }
    #hint-box p  { font-size: 0.92rem; opacity: 0.85; margin: 5px 0; }

    #btn-start {
      margin-top: 20px;
      background: #38bdf8;
      border: none;
      padding: 12px 30px;
      border-radius: 30px;
      color: white;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-start:active { background: #0ea5e9; }

    /* ── Toast ── */
    #status-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 22px;
      border-radius: 30px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.88rem;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 9998;
      pointer-events: none;
    }
    #status-toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Tela inicial -->
  <div id="ui-overlay">
    <div id="hint-box">
      <h2>🐦 AR Bird</h2>
      <p>Coloque <b>bird.glb</b> na mesma pasta</p>
      <p>Abra via <b>HTTPS</b> (GitHub Pages ✓)</p>
      <p>Aponte para o <b>marcador Hiro</b></p>
      <button id="btn-start">▶ Começar</button>
    </div>
  </div>

  <div id="status-toast"></div>

  <!--
    SEM o atributo "embedded":
    O AR.js gerencia o tamanho da cena sozinho (fullscreen).
    Com "embedded" o dev precisa definir width/height via CSS
    — se esquecer, a cena fica com tamanho 0 e a câmera some.
  -->
  <a-scene
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true"
    arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720"
  >
    <a-assets>
      <a-asset-item id="bird-model" src="bird.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-circle
        position="0 0.005 0"
        radius="0.38"
        rotation="-90 0 0"
        color="#000"
        opacity="0.15"
      ></a-circle>

      <a-gltf-model
        id="bird"
        src="#bird-model"
        position="0 0.1 0"
        scale="0.22 0.22 0.22"
        animation-mixer
        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
      ></a-gltf-model>
    </a-marker>

    <a-entity camera look-controls="enabled: false"></a-entity>
  </a-scene>

  <script>
    /* ── Toast ───────────────────────────────────────────────────── */
    let _toastTimer;
    function showToast(msg, persistent) {
      const t = document.getElementById('status-toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(_toastTimer);
      if (!persistent) _toastTimer = setTimeout(() => t.classList.remove('show'), 4500);
    }

    /* ── Botão Começar ───────────────────────────────────────────── */
    document.getElementById('btn-start').addEventListener('click', () => {
      document.getElementById('ui-overlay').style.display = 'none';
      showToast('🐦 Aponte para o marcador Hiro');
    });

    /* ── Eventos do modelo ───────────────────────────────────────── */
    const bird = document.querySelector('#bird');
    bird.addEventListener('model-loaded', () => showToast('✨ Modelo OK — aponte para o Hiro'));
    bird.addEventListener('model-error',  () => showToast('⚠️ bird.glb não encontrado', true));

    /* ── Fix vídeo (Android / iOS) ───────────────────────────────── */
    function fixVideo() {
      document.querySelectorAll('video').forEach(v => {
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.style.objectFit = 'cover';
      });
    }
    window.addEventListener('load', () => {
      fixVideo();
      setTimeout(fixVideo, 800);
      setTimeout(fixVideo, 2000);
    });

    /* ── Erros detalhados na tela ────────────────────────────────── */
    window.addEventListener('error', e => {
      const src  = (e.filename || '').split('/').pop() || '?';
      const line = e.lineno || '?';
      showToast(`❌ ${src}:${line} — ${e.message}`, true);
      console.error('[AR Bird]', e);
    });
    window.addEventListener('unhandledrejection', e => {
      showToast(`❌ ${e.reason}`, true);
      console.error('[AR Bird Promise]', e.reason);
    });
  </script>
</body>
</html>
