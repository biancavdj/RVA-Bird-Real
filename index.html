<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Bird 🐦</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      /* CRÍTICO: background transparent para o vídeo aparecer */
      background: transparent !important;
    }

    /* ── Remove UI padrão A-Frame ── */
    .a-enter-vr, .a-enter-ar,
    .a-loader-title, .a-orientation-modal { display: none !important; }

    /* ── CANVAS: deve ser transparente em cima do vídeo ── */
    canvas, .a-canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      /* CRÍTICO: sem background, sem opacidade */
      background: transparent !important;
      opacity: 1 !important;
      z-index: 1 !important;
    }

    /* ── VÍDEO da câmera: atrás do canvas ── */
    video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      object-fit: cover !important;
      /* CRÍTICO: z-index menor que o canvas */
      z-index: 0 !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    /* ── Tela inicial ── */
    #screen-welcome {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      background: rgba(15,15,15,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px 26px;
      max-width: 320px; width: 88%;
      text-align: center; color: white;
      line-height: 1.65;
    }
    .card h2 { font-size: 1.35rem; margin-bottom: 12px; }
    .card p  { font-size: 0.9rem; opacity: 0.8; margin: 5px 0; }

    #btn-start {
      margin-top: 20px;
      background: #38bdf8; border: none;
      padding: 12px 0; width: 100%;
      border-radius: 30px; color: white;
      font-size: 1rem; font-family: inherit;
      cursor: pointer;
    }
    #btn-start:active { background: #0ea5e9; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px;
      left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: white;
      padding: 10px 22px; border-radius: 30px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.88rem; white-space: nowrap;
      opacity: 0; transition: opacity 0.4s;
      z-index: 9999; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Tela inicial -->
  <div id="screen-welcome">
    <div class="card">
      <h2>🐦 AR Bird</h2>
      <p>Coloque <b>bird.glb</b> na mesma pasta</p>
      <p>Abra via <b>HTTPS</b> (GitHub Pages ✓)</p>
      <p>Aponte para o <b>marcador Hiro</b></p>
      <button id="btn-start">▶ Começar</button>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Scripts carregados ANTES da cena -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>

  <a-scene
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true; premultipliedAlpha: false"
    arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; debugUIEnabled: false"
  >
    <a-assets timeout="10000">
      <a-asset-item id="bird-model" src="bird.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-circle
        position="0 0.005 0" radius="0.38"
        rotation="-90 0 0" color="#000" opacity="0.15"
      ></a-circle>
      <a-gltf-model
        id="bird"
        src="#bird-model"
        position="0 0.1 0"
        scale="0.22 0.22 0.22"
        animation-mixer
        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
      ></a-gltf-model>
    </a-marker>

    <a-entity camera look-controls="enabled: false"></a-entity>
  </a-scene>

  <script>
    /* ── Toast ─────────────────────────────────── */
    let _tt;
    function toast(msg, persistent) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(_tt);
      if (!persistent) _tt = setTimeout(() => t.classList.remove('show'), 4500);
    }

    /* ── Botão Começar ─────────────────────────── */
    document.getElementById('btn-start').addEventListener('click', () => {
      document.getElementById('screen-welcome').style.display = 'none';
      toast('🐦 Aponte para o marcador Hiro');
    });

    /* ── Modelo ────────────────────────────────── */
    document.querySelector('#bird').addEventListener('model-loaded', () => toast('✨ Modelo OK!'));
    document.querySelector('#bird').addEventListener('model-error',  () => toast('⚠️ bird.glb não encontrado', true));

    /* ── CORREÇÃO PRINCIPAL ANDROID:
       O WebGL renderer do A-Frame no Android define
       gl.clearColor com alpha=1 (opaco), cobrindo o vídeo.
       Precisamos forçar alpha=0 após a cena inicializar.    ── */
    document.querySelector('a-scene').addEventListener('renderstart', () => {
      const renderer = document.querySelector('a-scene').renderer;
      if (renderer) {
        renderer.setClearColor(0x000000, 0); // alpha 0 = transparente
        renderer.setPixelRatio(window.devicePixelRatio);
      }
    });

    /* ── Fix vídeo Android ─────────────────────── */
    function fixVideo() {
      document.querySelectorAll('video').forEach(v => {
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.style.cssText = `
          position: fixed !important;
          top: 0 !important; left: 0 !important;
          width: 100vw !important; height: 100vh !important;
          object-fit: cover !important;
          z-index: 0 !important;
          display: block !important;
          visibility: visible !important;
          opacity: 1 !important;
        `;
      });
    }

    /* Aplica várias vezes pois o AR.js recria o elemento vídeo */
    [0, 500, 1000, 2000, 3500].forEach(t => setTimeout(fixVideo, t));

    /* ── Erros na tela ─────────────────────────── */
    window.addEventListener('error', e => {
      toast(`❌ ${(e.filename||'').split('/').pop()}:${e.lineno} — ${e.message}`, true);
    });
    window.addEventListener('unhandledrejection', e => {
      toast(`❌ ${e.reason}`, true);
    });
  </script>
</body>
</html></head>
<body>

  <!-- Tela inicial -->
  <div id="ui-overlay">
    <div id="hint-box">
      <h2>🐦 AR Bird</h2>
      <p>Coloque <b>bird.glb</b> na mesma pasta</p>
      <p>Abra via <b>HTTPS</b> (GitHub Pages ✓)</p>
      <p>Aponte para o <b>marcador Hiro</b></p>
      <button id="btn-start">▶ Começar</button>
    </div>
  </div>

  <div id="status-toast"></div>

  <!--
    SEM o atributo "embedded":
    O AR.js gerencia o tamanho da cena sozinho (fullscreen).
    Com "embedded" o dev precisa definir width/height via CSS
    — se esquecer, a cena fica com tamanho 0 e a câmera some.
  -->
  <a-scene
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true"
    arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720"
  >
    <a-assets>
      <a-asset-item id="bird-model" src="bird.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-circle
        position="0 0.005 0"
        radius="0.38"
        rotation="-90 0 0"
        color="#000"
        opacity="0.15"
      ></a-circle>

      <a-gltf-model
        id="bird"
        src="#bird-model"
        position="0 0.1 0"
        scale="0.22 0.22 0.22"
        animation-mixer
        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
      ></a-gltf-model>
    </a-marker>

    <a-entity camera look-controls="enabled: false"></a-entity>
  </a-scene>

  <script>
    /* ── Toast ───────────────────────────────────────────────────── */
    let _toastTimer;
    function showToast(msg, persistent) {
      const t = document.getElementById('status-toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(_toastTimer);
      if (!persistent) _toastTimer = setTimeout(() => t.classList.remove('show'), 4500);
    }

    /* ── Botão Começar ───────────────────────────────────────────── */
    document.getElementById('btn-start').addEventListener('click', () => {
      document.getElementById('ui-overlay').style.display = 'none';
      showToast('🐦 Aponte para o marcador Hiro');
    });

    /* ── Eventos do modelo ───────────────────────────────────────── */
    const bird = document.querySelector('#bird');
    bird.addEventListener('model-loaded', () => showToast('✨ Modelo OK — aponte para o Hiro'));
    bird.addEventListener('model-error',  () => showToast('⚠️ bird.glb não encontrado', true));

    /* ── Fix vídeo (Android / iOS) ───────────────────────────────── */
    function fixVideo() {
      document.querySelectorAll('video').forEach(v => {
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.style.objectFit = 'cover';
      });
    }
    window.addEventListener('load', () => {
      fixVideo();
      setTimeout(fixVideo, 800);
      setTimeout(fixVideo, 2000);
    });

    /* ── Erros detalhados na tela ────────────────────────────────── */
    window.addEventListener('error', e => {
      const src  = (e.filename || '').split('/').pop() || '?';
      const line = e.lineno || '?';
      showToast(`❌ ${src}:${line} — ${e.message}`, true);
      console.error('[AR Bird]', e);
    });
    window.addEventListener('unhandledrejection', e => {
      showToast(`❌ ${e.reason}`, true);
      console.error('[AR Bird Promise]', e.reason);
    });
  </script>
</body>
</html>
