<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bird AR</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1a1a, #2a2a2a);
    }

    .msg {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="msg">Toque no botão AR para colocar o pássaro no ambiente</div>

  <model-viewer
    src="bird.glb"
    alt="Pássaro 3D"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    autoplay
    auto-rotate
    shadow-intensity="1"
    exposure="1">
  </model-viewer>
</body>
</html>
