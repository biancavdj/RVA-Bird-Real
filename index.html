<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Bird 🐦</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

<style>

html, body {
margin: 0;
width: 100%;
height: 100%;
overflow: hidden;
background: black;
}

/* remove botão VR */
.a-enter-vr {
display: none !important;
}

/* corrige zoom da câmera */
video,
canvas,
.a-canvas,
.arjs-video {
object-fit: contain !important;
width: 100% !important;
height: 100% !important;
}

/* painel inicial */

#ui {
position: fixed;
top:0;
bottom:0;
left:0;
right:0;

display:flex;
align-items:center;
justify-content:center;

z-index:999;
}

#hint {

background: rgba(0,0,0,0.7);

color:white;

padding:20px;

border-radius:16px;

max-width:320px;

font-family:Segoe UI;

text-align:center;
}

#bottom-hint {

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,0.6);

color:white;

padding:10px 18px;

border-radius:30px;

font-family:Segoe UI;

opacity:0;

transition:0.5s;

z-index:999;

}

</style>

</head>


<body>

<div id="ui">

<div id="hint">

<strong>🐦 Como usar</strong>

<br><br>

Coloque <b>bird.glb</b> na mesma pasta do HTML

<br><br>

Abra usando HTTPS (Netlify recomendado)

<br><br>

Aponte para o marcador Hiro

<br><br>

<button

onclick="

document.getElementById('ui').style.display='none';

document.getElementById('bottom-hint').style.opacity='1';

"

style="

background:#38bdf8;

border:none;

padding:10px 22px;

border-radius:30px;

color:white;

cursor:pointer;

">

Começar

</button>

</div>

</div>


<div id="bottom-hint">

🐦 Aponte para o marcador Hiro

</div>



<a-scene

vr-mode-ui="enabled:false"

renderer="antialias:true; alpha:true; logarithmicDepthBuffer:true"

arjs="trackingMethod:best; sourceType:webcam; facingMode:environment; debugUIEnabled:false"

>


<a-assets>

<a-asset-item

id="bird-model"

src="bird.glb"

></a-asset-item>

</a-assets>



<a-marker preset="hiro">


<a-circle

position="0 0.005 0"

radius="0.35"

rotation="-90 0 0"

color="black"

opacity="0.2"

></a-circle>



<a-entity position="0 0 0">


<a-gltf-model

id="bird"

src="#bird-model"

position="0 0.08 0"

scale="0.22 0.22 0.22"

animation-mixer

animation="property: rotation; to: 0 360 0; loop:true; dur:12000; easing:linear"

>

</a-gltf-model>


</a-entity>



</a-marker>


<a-entity

camera

look-controls="enabled:false"

></a-entity>


</a-scene>



<script>

/* corrige zoom android */

window.addEventListener("load", ()=>{

setTimeout(()=>{

document.querySelectorAll("video")

.forEach(v=>{

v.setAttribute("playsinline",true);

v.style.objectFit="contain";

});

},1000);

});


/* status carregamento */

const bird=document.querySelector("#bird");

const hint=document.querySelector("#bottom-hint");


bird.addEventListener("model-loaded",()=>{

hint.innerText="✨ Modelo carregado com sucesso";

hint.style.opacity=1;

});


bird.addEventListener("model-error",()=>{

hint.innerText="⚠️ Arquivo bird.glb não encontrado";

hint.style.opacity=1;

});


</script>



</body>

</html>
